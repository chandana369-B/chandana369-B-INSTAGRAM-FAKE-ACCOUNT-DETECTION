# Instagram Fake Account Detection

## Quick start
1. Create & activate venv:
   - macOS/Linux:
     
     python -m venv .venv
     source .venv/bin/activate
     
   - Windows PowerShell:
     
     python -m venv .venv
     .venv\Scripts\activate
     

2. Install dependencies:
    pip install -r requirements.txt
3. Optionally, to allow private-account access set env vars:
- macOS/Linux:
  
  export INSTA_USER="your_instagram_username"
  export INSTA_PASS="your_instagram_password"
  
- Windows PowerShell:
  
  $env:INSTA_USER="your_instagram_username"
  $env:INSTA_PASS="your_instagram_password"
  

4. Run the app:
    python app.py
    Open http://127.0.0.1:5000

## Retrain from dataset
   python generate_dataset.py 
   python train_model.py